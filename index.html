<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iphone Home Screen UI</title>
    <link rel="stylesheet" href="assets/style/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <main class="fullscreenlayout">
        <!-- leftscreen -->
        <section class="screendiv Leftscreen">
            <div class="firstcreen">
                <img src="assets/images/pexels-mauroignaciotorres-8606535.jpg" alt="iPhone background"
                    class="background-img">
                <!-- searchbar -->
                <div class="status-bar">
                    <!-- clock -->
                    <span class="uhr">10:26</span>
                    <!-- top icons -->
                    <div class="status-icons">
                        <i class="fa-solid fa-signal"></i>
                        <i class="fa-solid fa-wifi"></i>
                        <i class="fa-solid fa-battery-three-quarters"></i>
                    </div>
                </div>
                <!-- searchbar -->
                <div class="searchbar">
                    <div class="magbin">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <!-- <i class="fa-solid fa-magnifying-glass bin"></i> -->
                    <input type="text" placeholder="App Library">
                </div>
            </div>
        </section>

        <section class="screen-section screen-section-right">
            <!-- Add the second phone screen here later -->
        </section>

    </main>
</body>
